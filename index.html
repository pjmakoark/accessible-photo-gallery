<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="gallery-container">
        <header class="gallery-header">
            <h1>Accessible Photo Gallery</h1>
            <p>A collection of beautiful images with accessibility features for all users</p>
        </header>

        <main class="gallery">
            <figure>
                <img src="https://picsum.photos/300/250?random=1"
                    alt="A serene mountain landscape with a lake reflecting the snow-capped peaks" loading="lazy">
                <figcaption>Serene Mountain Landscape</figcaption>
            </figure>

            <figure>
                <img src="https://picsum.photos/300/250?random=2" alt="A vibrant sunset over a calm ocean"
                    loading="lazy">
                <figcaption>Vibrant Ocean Sunset</figcaption>
            </figure>

            <figure>
                <img src="https://picsum.photos/300/250?random=3"
                    alt="A dense forest with sunlight filtering through the trees" loading="lazy">
                <figcaption>Dense Forest Sunlight</figcaption>
            </figure>

            <figure>
                <img src="https://picsum.photos/300/250?random=4"
                    alt="A snow-covered winter scene with trees and a wooden cabin" loading="lazy">
                <figcaption>Winter Cabin Scene</figcaption>
            </figure>

            <figure>
                <img src="https://picsum.photos/300/250?random=5"
                    alt="A colorful autumn forest with red and orange leaves" loading="lazy">
                <figcaption>Colorful Autumn Forest</figcaption>
            </figure>

            <figure>
                <img src="https://picsum.photos/300/250?random=6"
                    alt="A desert landscape with rock formations at sunset" loading="lazy">
                <figcaption>Desert Rock Formations</figcaption>
            </figure>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
